name: Deploy to GitHub Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install

      - name: Copy assets (prebuild)
        # Ensure token images are available in wiki/public before building
        run: node data/scripts/copy-assets-to-public.js

      - name: Build wiki
        env:
          SITE_URL: "https://clouds56-bot.github.io"
          BASE_PATH: "/blood-clocktower-wiki"
        run: pnpm -C wiki run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./wiki/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
