name: Game CI

on:
  push:
    branches: [ master, main ]
    paths:
      - 'game/**'
      - '.github/workflows/game-ci.yml'
  pull_request:
    paths:
      - 'game/**'
      - '.github/workflows/game-ci.yml'

permissions:
  contents: read

jobs:
  ci:
    name: Typecheck, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm --filter game run typecheck

      - name: Test with coverage
        run: pnpm --filter game run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./game/coverage/lcov.info
          flags: game
          fail_ci_if_error: false
